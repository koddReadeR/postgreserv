---
- name: Install PostgreSQL repository RPM
  dnf:
    name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
    state: present 

- name: Disable default PostgreSQL module
  command: dnf -qy module disable postgresql
  args:
    creates: /etc/yum.repos.d/pgdg-redhat-all.repo

- name: Install PostgreSQL packages
  dnf:
    name:
      - postgresql{{ postgres_version }}-server
      - postgresql{{ postgres_version }}-contrib
    state: present

- name: Initialize PostgreSQL database
  command: /usr/pgsql-{{ postgres_version }}/bin/postgresql-{{ postgres_version }}-setup initdb
  args:
    creates: /var/lib/pgsql/{{ postgres_version }}/data/postgresql.conf

- name: Ensure PostgreSQL service is enabled and started
  service:
    name: postgresql-{{ postgres_version }}
    state: started
    enabled: true

- name: Create PostgreSQL database
  become_user: postgres
  postgresql_db:
    name: "{{ postgres_db }}"
    state: present
  notify: Restart PostgreSQL

- name: Create PostgreSQL user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    state: present
  notify: Restart PostgreSQL 
  
- name: Grant privileges to PostgreSQL user on database
  become_user: postgres
  community.postgresql.postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: database
    privs: ALL

- name: Allow remote connections to PostgreSQL
  lineinfile:
    dest: /var/lib/pgsql/{{ postgres_version }}/data/postgresql.conf
    regexp: '^#?listen_addresses =.*'
    line: "listen_addresses = '*'"

- name: Configure PostgreSQL authentication
  lineinfile:
    dest: /var/lib/pgsql/{{ postgres_version }}/data/pg_hba.conf
    line: "host    all             all             0.0.0.0/0               md5"
    insertafter: EOF
